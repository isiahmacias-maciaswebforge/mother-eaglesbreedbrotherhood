name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOTHER-EAGLESBREEDBROTHERHOOD }}
          projectId: mother-eaglesbreedbrotherhood
          channelId: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'live' || 'preview' }}
